name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Setup pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

    - name: Run pre-commit hooks
      run: pre-commit run --all-files

  check-dist:
    runs-on: ubuntu-latest
    name: Check dist is up to date
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Rebuild the dist bundle
      run: npm run package

    - name: Verify dist matches the committed bundle
      run: |
        if [ -n "$(git status --porcelain dist/)" ]; then
          echo "::error::dist/ is out of date. Run 'npm run package' and commit the result."
          git --no-pager diff --stat dist/
          exit 1
        fi

  dependency-review:
    runs-on: ubuntu-latest
    name: Dependency review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Review dependencies
      uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
      with:
        comment-summary-in-pr: on-failure

  test:
    runs-on: ubuntu-latest
    name: Test Coverage Treemap Action

    steps:
    - name: Determine fetch depth
      id: base-depth
      env:
        PR_COMMITS: ${{ github.event.pull_request.commits }}
      run: echo "base-depth=$(expr "${PR_COMMITS:-0}" + 1)" | tee -a $GITHUB_OUTPUT

    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        fetch-depth: ${{ steps.base-depth.outputs.base-depth }}

    - name: Dump Github context
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -x
        echo "$GITHUB_CONTEXT"
        git log --oneline
        echo "base-depth=${{ steps.base-depth.outputs.base-depth }}"
        if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
          git diff "$BASE_SHA..$HEAD_SHA"
        else
          echo "Not a pull_request event; skipping base..head diff."
        fi
      shell: bash

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run build -- --noEmit

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Build action
      run: |
        mkdir -p dist
        npm run package

    - name: Upload coverage reports
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: coverage-report
        path: coverage/
        retention-days: 3

    - name: Run Coveragemap action
      # The action analyses the diff of a pull request and needs the PR head
      # SHA, which only exists on pull_request events. On push (e.g. the merge
      # to main) there is no PR context, so skip the self-test there.
      if: github.event_name == 'pull_request'
      uses: ./
      id: coveragemap
      with:
        lcov-file: "./coverage/lcov.info"
        coverage-threshold: "80"
        github-token: ${{ secrets.GITHUB_TOKEN }}
        github-app-id: ${{ secrets.COVERAGEMAP_APP_ID }}
        github-app-private-key: ${{ secrets.COVERAGEMAP_APP_PRIVATE_KEY }}
        source-code-pattern: "src/**/*.ts"
        test-code-pattern: "src/**/*.test.ts, src/__mocks__/**/*"
        # Self-test the report surfaces: keep the PR comment and also write the
        # coverage summary to the workflow run's job summary page.
        pr-comment: "true"
        job-summary: "true"
