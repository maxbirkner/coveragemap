name: Coverage Map Action
description: Analyzes coverage for files changed in a PR, renders a treemap of test gaps, and enforces a coverage threshold.
author: maxbirkner
branding:
  icon: bar-chart-2
  color: green

inputs:
  lcov-file:
    description: The path to the lcov.info coverage report file
    required: true
    default: ./coverage/lcov.info
  coverage-threshold:
    description: |
      The minimum acceptable coverage percentage for changed files.
      Only used when gate-mode is "threshold".
    required: false
    default: "80"
  gate-mode:
    description: |
      How to gate the workflow on coverage. One of:
      - "threshold": fail when changed-files coverage is below coverage-threshold (default).
      - "baseline": fail when changed-files coverage is below the overall project coverage.
      - "none": never fail the workflow; report coverage without gating.
    required: false
    default: threshold
  target-branch:
    description: The target branch to compare changes against
    required: false
    default: main
  github-token:
    description: GitHub token to post PR comments
    required: true
  pr-comment:
    description: |
      Whether to post (and update) a coverage summary comment on the pull request.
      Set to "false" to suppress the PR comment and avoid cluttering the PR.
    required: false
    default: "true"
  job-summary:
    description: |
      Whether to write the coverage summary to the GitHub Actions job summary.
      Enabled with "true" to surface coverage on the workflow run page without
      posting a PR comment.
    required: false
    default: "false"
  label:
    description: |
      Optional label for identification (enables multiple instances).
    required: false
  treemap-title:
    description: |
      Optional title rendered at the top of the treemap image.
      Defaults to "Coverage Treemap".
    required: false
  source-code-pattern:
    description: |
      Optional glob pattern(s) for source code files to include in coverage analysis.
      Multiple patterns can be separated by commas (e.g., "src/**/*.ts,lib/**/*.js").
      If not provided, defaults to common source code extensions.
    required: false
  test-code-pattern:
    description: |
      Optional glob pattern(s) for test files to exclude from coverage analysis.
      Multiple patterns can be separated by commas (e.g., "**/*.test.ts,**/*.spec.js").
      If not provided, defaults to common test file patterns.
    required: false
  github-app-id:
    description: |
      Optional GitHub App ID for posting check annotations.
      When provided with github-app-private-key, enables posting up to 50 annotations
      to the PR using the GitHub Checks API.
    required: false
  github-app-private-key:
    description: |
      Optional GitHub App Private Key for posting check annotations.
      When provided with github-app-id, enables posting up to 50 annotations
      to the PR using the GitHub Checks API.
    required: false

outputs:
  coverage-percentage:
    description: The overall coverage percentage for changed files
  meets-threshold:
    description: Whether the coverage meets the specified threshold (true/false)
  files-analyzed:
    description: The number of changed files that were analyzed
  files-with-coverage:
    description: The number of changed files that have coverage data

runs:
  using: node24
  main: dist/index.js
